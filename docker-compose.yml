version: '3.8'

services:
  
  db:
    image: postgres:15-alpine
    container_name: smmbox_db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: superpassword123
      POSTGRES_DB: smmbox
    volumes:
      - pgdata:/var/lib/postgresql/data
    
  redis:
    image: redis:7-alpine
    container_name: smmbox_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  backend:
    build: ./backend
    container_name: smmbox_backend
    restart: always
    environment:
      - DATABASE_URL=postgresql://admin:superpassword123@db:5432/smmbox?schema=public
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - VK_APP_ID=${VK_APP_ID}
      - VK_APP_SECRET=${VK_APP_SECRET}
      - VK_SERVICE_TOKEN=${VK_SERVICE_TOKEN}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - FRONTEND_URL=${FRONTEND_URL}
      - PORT=5000
      - KOMOD_TOKEN=${KOMOD_TOKEN}
      - KOMOD_BASE_URL=${KOMOD_BASE_URL}
      - KIE_API_KEY=${KIE_API_KEY}
    depends_on:
      - db
      - redis
    volumes:
      - ./backend/logs:/app/logs         # Теперь логи пишутся куда надо
      - ./backend/uploads:/app/uploads

  
  frontend:
    build: ./frontend
    container_name: smmbox_frontend
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - backend


volumes:
  pgdata:
  redisdata: