# Перенаправление всех HTTP-запросов на HTTPS
server {
    listen 80;
    server_name smmdeck.ru www.smmdeck.ru;
    return 301 https://$host$request_uri;
}

# Основной защищенный сервер HTTPS
server {
    listen 443 ssl;
    server_name smmdeck.ru www.smmdeck.ru;

    # Пути к сертификатам, которые мы выпустили
    ssl_certificate /etc/letsencrypt/live/smmdeck.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/smmdeck.ru/privkey.pem;

    # Современные настройки безопасности SSL
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Отдаем статику React
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html; # Важно для роутинга React
    }

    # Проксируем API-запросы на бэкенд
    location /api/ {
        proxy_pass http://backend:5000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https; # Сообщаем бэкенду, что мы по HTTPS
    }
}