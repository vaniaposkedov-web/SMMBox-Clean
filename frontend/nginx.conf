# Перенаправление всех HTTP-запросов на HTTPS
server {
    listen 80;
    server_name sadovodps24.ru www.sadovodps24.ru;
    return 301 https://$host$request_uri;
}


server {
    listen 443 ssl;
    server_name sadovodps24.ru www.sadovodps24.ru;
    client_max_body_size 50M;

    
    ssl_certificate /etc/letsencrypt/live/sadovodps24.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sadovodps24.ru/privkey.pem;

    
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    
    # Обработка основного роутинга React
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html; 
    }

    # Запрещаем кэшировать index.html, чтобы пользователи всегда получали актуальную версию
    location ~* \.html$ {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        try_files $uri /index.html;
    }

    # Разрешаем кэшировать статические файлы Vite на год (так как у них меняются хеши в названиях)
    location ~* \.(?:css|js|jpg|svg|png|woff2?|eot|ttf)$ {
        root /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public";
    }

    
    location /api/ {
        proxy_pass http://backend:5000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https; 
    }

    location /uploads/ {
        proxy_pass http://backend:5000/uploads/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}